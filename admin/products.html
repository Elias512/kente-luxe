<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://csajcdvwmmumhpuzpmuk.supabase.co">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<title>Products - Admin - Kente Luxe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<style>
.admin-section { max-width: 1100px; margin: 4rem auto; padding: 0 1.5rem; }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.admin-loading { text-align: center; padding: 3rem 0; color: var(--muted); }
.data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.data-table th { text-align: left; padding: 0.75rem 0.5rem; color: var(--muted); font-weight: 400; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; border-bottom: 1px solid rgba(201, 168, 76, 0.15); white-space: nowrap; }
.data-table td { padding: 0.75rem 0.5rem; border-bottom: 1px solid rgba(201, 168, 76, 0.06); color: var(--text); vertical-align: middle; }
.data-table tr:hover { background: rgba(201, 168, 76, 0.03); }
.btn-sm { padding: 0.35rem 0.8rem; font-size: 0.72rem; }
.btn-danger { background: transparent; color: #ef9a9a; border: 1px solid rgba(183, 28, 28, 0.4); }
.btn-danger:hover { background: rgba(183, 28, 28, 0.15); border-color: #ef9a9a; color: #ef9a9a; }
.product-img-thumb { width: 48px; height: 48px; object-fit: cover; border: 1px solid rgba(201, 168, 76, 0.15); }
.product-placeholder-thumb { width: 48px; height: 48px; background: var(--dark-3); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.6rem; border: 1px solid rgba(201, 168, 76, 0.1); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal-content { background: var(--dark-2); border: 1px solid rgba(201, 168, 76, 0.2); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 2rem; }
.modal-content h2 { font-family: 'Cormorant Garamond', serif; color: var(--cream); margin-bottom: 1.5rem; }
.modal-form { display: flex; flex-direction: column; gap: 1rem; }
.modal-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.modal-form .form-error { font-size: 0.85rem; }
.modal-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
@media (max-width: 768px) { .modal-form .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="kente-line"></div>

<nav>
  <a href="../index.html" class="nav-logo">Kente <span>Luxe</span></a>
  <ul class="nav-links">
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="orders.html">Orders</a></li>
    <li><a href="products.html" class="active">Products</a></li>
    <li><a href="customers.html">Customers</a></li>
    <li><a href="custom-orders.html">Custom Orders</a></li>
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="analytics.html">Analytics</a></li>
  </ul>
  <div class="nav-actions">
    <span id="admin-email-display" style="font-size:0.78rem;color:var(--muted);"></span>
    <a href="profile.html" style="font-size:0.78rem;color:var(--gold);text-decoration:none;margin-right:0.8rem;">Profile</a>
    <button class="btn-outline-kl" id="admin-signout-btn" style="padding:0.4rem 1rem;font-size:0.72rem;">Sign Out</button>
    <button class="btn-outline-kl" id="admin-signout-btn" style="padding:0.4rem 1rem;font-size:0.72rem;">Sign Out</button>
  </div>
  <button class="nav-toggle" aria-label="Toggle menu">☰</button>
</nav>

<section class="admin-section">
  <div class="admin-header">
    <h1 class="section-title" style="margin-bottom:0;">Manage <em>Products</em></h1>
    <button class="btn-primary-kl" id="add-product-btn" style="padding:0.6rem 1.5rem;font-size:0.75rem;">+ Add Product</button>
  </div>
  <div id="products-loading" class="admin-loading">Loading products...</div>
  <div id="products-content" style="display:none;">
    <div id="products-total" style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem;"></div>
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th></th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Region</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="products-tbody"></tbody>
      </table>
    </div>
  </div>
</section>

<div class="modal-overlay" id="product-modal">
  <div class="modal-content">
    <h2 id="modal-title">Add Product</h2>
    <form class="modal-form" id="product-form">
      <div class="form-group">
        <label class="form-label" for="p-name">Name <span class="form-required">*</span></label>
        <input class="form-input" type="text" id="p-name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="p-description">Description</label>
        <textarea class="form-textarea" id="p-description" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="p-price">Price (GHS) <span class="form-required">*</span></label>
          <input class="form-input" type="number" id="p-price" required min="0" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label" for="p-stock">Stock <span class="form-required">*</span></label>
          <input class="form-input" type="number" id="p-stock" required min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="p-fabric">Fabric Type <span class="form-required">*</span></label>
          <select class="form-select" id="p-fabric" required>
            <option value="">Select fabric</option>
            <option value="Kente">Kente</option>
            <option value="Ankara">Ankara</option>
            <option value="Smock">Smock</option>
            <option value="Jewelry">Jewelry</option>
            <option value="Kente Silk">Kente Silk</option>
            <option value="Adinkra">Adinkra</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="p-region">Region <span class="form-required">*</span></label>
          <select class="form-select" id="p-region" required>
            <option value="">Select region</option>
            <option value="West African">West African</option>
            <option value="Pan-African">Pan-African</option>
            <option value="East African">East African</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="p-category">Category</label>
          <select class="form-select" id="p-category">
            <option value="">—</option>
            <option value="Fashion & Textiles">Fashion & Textiles</option>
            <option value="Accessories">Accessories</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="p-gender">Gender</label>
          <select class="form-select" id="p-gender">
            <option value="">—</option>
            <option value="Men">Men</option>
            <option value="Women">Women</option>
            <option value="Unisex">Unisex</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="p-subcategory">Subcategory</label>
        <input class="form-input" type="text" id="p-subcategory" placeholder="e.g. Kente cloth">
      </div>
      <div class="form-group">
        <label class="form-label" for="p-image">Image URL</label>
        <input class="form-input" type="url" id="p-image" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label" for="p-occasion">Occasions (comma-separated)</label>
        <input class="form-input" type="text" id="p-occasion" placeholder="Wedding, Formal, Festival">
      </div>
      <div class="form-group">
        <label class="form-label" for="p-story">Story</label>
        <textarea class="form-textarea" id="p-story" rows="3" placeholder="Product story / heritage"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="p-color-palette">Color Palette</label>
        <input class="form-input" type="text" id="p-color-palette" placeholder="Gold, Green, Red, Blue">
      </div>
      <div class="form-group">
        <label class="form-label" for="p-care">Care Instructions</label>
        <textarea class="form-textarea" id="p-care" rows="2" placeholder="Dry clean only, etc."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="p-bestseller" style="margin-right:0.4rem;">Bestseller
          </label>
        </div>
        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="p-featured" style="margin-right:0.4rem;">Featured
          </label>
        </div>
      </div>
      <div class="form-error" id="product-form-error"></div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary-kl" id="product-form-submit">Save</button>
        <button type="button" class="btn-outline-kl" id="product-form-cancel">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
  import { apiFetch } from '../js/cart.js'
  import { requireManager, adminSignOut, formatCurrency } from '../js/admin.js'

  const navToggle = document.querySelector('.nav-toggle')
  const navLinks = document.querySelector('.nav-links')
  if (navToggle && navLinks) {
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'))
    document.addEventListener('click', (e) => { if (!e.target.closest('nav')) navLinks.classList.remove('open') })
  }

  const auth = await requireManager()
  if (!auth) throw new Error('Not authorized')

  document.getElementById('admin-email-display').textContent = auth.user.email
  document.getElementById('admin-signout-btn').addEventListener('click', adminSignOut)

  const loadingEl = document.getElementById('products-loading')
  const contentEl = document.getElementById('products-content')
  const tbody = document.getElementById('products-tbody')
  const modal = document.getElementById('product-modal')
  const modalTitle = document.getElementById('modal-title')
  const form = document.getElementById('product-form')
  const formError = document.getElementById('product-form-error')
  const submitBtn = document.getElementById('product-form-submit')
  const cancelBtn = document.getElementById('product-form-cancel')

  let editingProductId = null

  function openModal(product = null) {
    editingProductId = product?.id || null
    modalTitle.textContent = product ? 'Edit Product' : 'Add Product'
    submitBtn.textContent = product ? 'Update' : 'Add Product'
    formError.textContent = ''
    document.getElementById('p-name').value = product?.name || ''
    document.getElementById('p-description').value = product?.description || ''
    document.getElementById('p-price').value = product?.price || ''
    document.getElementById('p-stock').value = product?.stock ?? ''
    document.getElementById('p-region').value = product?.region || ''
    document.getElementById('p-fabric').value = product?.fabric_type || ''
    document.getElementById('p-category').value = product?.category || ''
    document.getElementById('p-gender').value = product?.gender || ''
    document.getElementById('p-subcategory').value = product?.subcategory || ''
    document.getElementById('p-image').value = product?.image_url || ''
    document.getElementById('p-occasion').value = Array.isArray(product?.occasion) ? product.occasion.join(', ') : (product?.occasion || '')
    document.getElementById('p-story').value = product?.story || ''
    document.getElementById('p-color-palette').value = product?.color_palette || ''
    document.getElementById('p-care').value = product?.care_instructions || ''
    document.getElementById('p-bestseller').checked = !!product?.bestseller
    document.getElementById('p-featured').checked = !!product?.featured
    modal.classList.add('open')
  }

  function closeModal() {
    modal.classList.remove('open')
    editingProductId = null
    form.reset()
    formError.textContent = ''
  }

  cancelBtn.addEventListener('click', closeModal)
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal() })

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    formError.textContent = ''
    submitBtn.disabled = true
    submitBtn.textContent = 'Saving...'
    const body = {
      name: document.getElementById('p-name').value.trim(),
      description: document.getElementById('p-description').value.trim() || null,
      price: parseFloat(document.getElementById('p-price').value),
      stock: parseInt(document.getElementById('p-stock').value),
      region: document.getElementById('p-region').value.trim() || null,
      fabric_type: document.getElementById('p-fabric').value.trim() || null,
      category: document.getElementById('p-category').value.trim() || null,
      gender: document.getElementById('p-gender').value || null,
      subcategory: document.getElementById('p-subcategory').value.trim() || null,
      image_url: document.getElementById('p-image').value.trim() || null,
      occasion: document.getElementById('p-occasion').value.split(',').map(s => s.trim()).filter(Boolean) || null,
      story: document.getElementById('p-story').value.trim() || null,
      color_palette: document.getElementById('p-color-palette').value.split(',').map(s => s.trim()).filter(Boolean) || null,
      care_instructions: document.getElementById('p-care').value.trim() || null,
      bestseller: document.getElementById('p-bestseller').checked,
      featured: document.getElementById('p-featured').checked
    }
    if (!body.name || isNaN(body.price) || isNaN(body.stock)) {
      formError.textContent = 'Name, price, and stock are required.'
      submitBtn.disabled = false
      submitBtn.textContent = editingProductId ? 'Update' : 'Add Product'
      return
    }
    try {
      if (editingProductId) {
        await apiFetch(`products?id=eq.${editingProductId}`, { method: 'PATCH', body: JSON.stringify(body) })
      } else {
        await apiFetch('products', { method: 'POST', body: JSON.stringify(body) })
      }
      closeModal()
      await loadProducts()
    } catch (err) {
      formError.textContent = err.message || 'Failed to save product'
      submitBtn.disabled = false
      submitBtn.textContent = editingProductId ? 'Update' : 'Add Product'
    }
  })

  document.getElementById('add-product-btn').addEventListener('click', () => openModal())

  async function deleteProduct(id) {
    if (!confirm('Delete this product? This cannot be undone.')) return
    try {
      await apiFetch(`products?id=eq.${id}`, { method: 'DELETE' })
      await loadProducts()
    } catch (err) { console.error('Delete failed:', err) }
  }

  async function loadProducts() {
    try {
      const products = await apiFetch('products?order=created_at.desc')
      if (!products || products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem 0;color:var(--muted);">No products found.</td></tr>'
        document.getElementById('products-total').textContent = '0 products'
        return
      }
      document.getElementById('products-total').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`
      tbody.innerHTML = products.map(p => `
        <tr>
          <td>${p.image_url ? `<img class="product-img-thumb" src="${p.image_url}" alt="${p.name}" loading="lazy">` : `<div class="product-placeholder-thumb">No img</div>`}</td>
          <td>
            <div style="font-weight:500;">${p.name}</div>
            ${p.description ? `<div style="font-size:0.75rem;color:var(--muted);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.description}</div>` : ''}
          </td>
          <td style="color:var(--gold);font-weight:500;">${formatCurrency(p.price)}</td>
          <td><span style="color:${p.stock <= 0 ? '#E74C3C' : p.stock < 5 ? '#E67E22' : 'var(--text)'}">${p.stock}</span></td>
          <td style="color:var(--muted);">${p.region || '—'}</td>
          <td>
            <button class="btn-outline-kl btn-sm edit-product" data-id="${p.id}" style="margin-right:0.4rem;">Edit</button>
            <button class="btn-outline-kl btn-sm btn-danger delete-product" data-id="${p.id}">Delete</button>
          </td>
        </tr>
      `).join('')
      document.querySelectorAll('.edit-product').forEach(btn => {
        btn.addEventListener('click', () => {
          const product = products.find(p => p.id === btn.dataset.id)
          if (product) openModal(product)
        })
      })
      document.querySelectorAll('.delete-product').forEach(btn => {
        btn.addEventListener('click', () => deleteProduct(btn.dataset.id))
      })
      loadingEl.style.display = 'none'
      contentEl.style.display = ''
    } catch (e) {
      loadingEl.textContent = 'Failed to load products.'
      console.error(e)
    }
  }

  loadProducts()
</script>

<footer>
  <div class="kente-line" style="margin-bottom:1.5rem;"></div>
  <div class="footer-bottom" style="padding:0 1.5rem 1.5rem;">
    <p>&copy; <span id="copyright-year"></span> Kente Luxe. All rights reserved.</p>
    <script>document.getElementById('copyright-year').textContent = new Date().getFullYear()</script>
    <p>Crafted with pride in Ghana &#x1F1EC;&#x1F1ED;</p>
  </div>
</footer>

</body>
</html>
